<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>eGO CRM - Optimizador de Imágenes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #1a2b4c;
            --accent: #5dade2;
            --bg: #f0f4f8;
            --success: #27ae60;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #334155;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .header-logo {
            background-color: var(--primary);
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            max-width: 180px;
            height: auto;
            display: block;
        }

        .content {
            padding: 40px;
        }

        p { 
            color: #64748b; 
            font-size: 15px; 
            margin: 0 0 32px 0; 
            line-height: 1.5;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 60px 20px;
            cursor: pointer;
            background: #ffffff;
            position: relative;
            transition: all 0.25s ease;
        }

        .drop-zone:hover {
            border-color: var(--accent);
            background: #f8fafc;
            transform: translateY(-2px);
        }

        .drop-zone p { 
            margin: 0; 
            font-weight: 600; 
            color: var(--primary);
            font-size: 16px;
        }

        #status-box {
            display: none;
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: #f1f5f9;
            color: var(--primary);
            font-weight: 500;
        }

        #log {
            margin-top: 24px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 12px;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="https://i.imgur.com/kVfITDo.png" alt="eGO CRM Logo" class="logo-img">
    </div>
    
    <div class="content">
        <p>Prepara tus fotos con el formato correcto y la resolución optima para insertar en <strong>eGO CRM</strong></p>
        
        <div class="drop-zone">
            <p>Arrastra tus fotos aquí</p>
            <span style="font-size: 13px; color: #94a3b8;">Formatos aceptados: JPG, PNG, WEBP...</span>
            <input type="file" id="files" multiple accept="image/*">
        </div>

        <div id="status-box">
            <div class="loader" id="spinner"></div> <span id="status-text">Iniciando...</span>
        </div>

        <div id="log"></div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const fileInput = document.getElementById('files');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const log = document.getElementById('log');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        const zip = new JSZip();
        statusBox.style.display = 'block';
        statusBox.style.background = '#f1f5f9';
        statusBox.style.color = 'var(--primary)';
        document.getElementById('spinner').style.display = 'inline-block';
        log.innerHTML = '';
        
        for (let i = 0; i < files.length; i++) {
            statusText.innerText = `Optimizando ${i + 1} de ${files.length}...`;
            const base64Data = await processFile(files[i]);
            const imageData = base64Data.split(',')[1];
            const cleanName = files[i].name.replace(/\.[^/.]+$/, "");
            zip.file(`${cleanName}_optima.png`, imageData, {base64: true});
            
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span>${files[i].name}</span><span style="color:var(--success)">✓ Optimizada</span>`;
            log.prepend(item);
        }

        statusText.innerText = "Creando archivo ZIP...";
        
        zip.generateAsync({type:"blob"}).then(function(content) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "fotos_ajustadas.zip";
            link.click();
            
            statusBox.style.background = "#ecfdf5";
            statusBox.style.color = "#065f46";
            statusText.innerText = "¡Proceso terminado con éxito!";
            document.getElementById('spinner').style.display = 'none';
        });
    });

    function processFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = 1600;
                    canvas.height = 1200;
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, 1600, 1200);
                    ctx.drawImage(img, 0, 0, 1600, 1200);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
